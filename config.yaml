# Architect WorldCup run configuration.
# as_of_date is the leakage boundary: no data after this date enters the model.
# 2026-06-10 is the pre-tournament baseline, the day before the World Cup
# started, so no 2026 tournament matches enter the ratings. This is the frozen
# baseline we score against reality later.
as_of_date: "2026-06-10"

# Monte Carlo simulation count.
n_sims: 10000

# Fixed seed for reproducibility. Same seed and data must produce same output.
random_seed: 42

# Time-decay weight for down-weighting older matches. Tuned in a later phase.
time_decay: 0.0065

# Elo rating parameters (Layer 2), all configurable.
elo:
  base_rating: 1500
  k_factor: 32
  home_advantage: 65

# Dixon-Coles goal model parameters (Layer 3).
dixon_coles:
  # Time-decay rate xi. Larger xi makes older matches lose weight faster, so
  # recent matches dominate. Tunable; 0.0018 follows the Dixon-Coles paper.
  xi: 0.0018
  # Match-importance downweight for friendlies, applied only when the
  # factors.friendly_downweight toggle is on. Friendlies are low-stakes and often
  # played with experimental lineups, so they carry weaker signal. This weight
  # multiplies onto the xi time decay, it does not replace it. 1.0 means no
  # downweight; 0.5 counts a friendly as half a competitive match.
  friendly_weight: 0.5

# Squad value adjustment parameters (Layer 4). Elo is the backbone; this layer
# nudges each team by how its current squad market value compares to the field.
squad:
  # Snapshot of national-team squad market values. A committed, dated, controlled
  # input, not a live scrape. The date aligns with as_of_date.
  snapshot: "data/squad_values/squad_values_2026-06-10.csv"
  # Rating points one standard deviation of squad value is worth. Tunable, and a
  # natural ablation factor later.
  weight: 30
  # Cap in rating points on the absolute nudge for any single team, so the
  # adjustment tempers Elo rather than overriding it. Tunable, and a natural
  # ablation factor later.
  max_adjustment: 120

# Tournament structure (Layer 5). Dated, committed snapshot of the World Cup
# 2026 format and group draw. A controlled input, not a live scrape.
tournament:
  structure: "data/tournament/wc2026_groups_2026-06-10.csv"
  # Official FIFA Annex C table mapping each of the 495 third-place qualifying
  # combinations to round-of-32 slots, parsed from the published schedule.
  r32_assignment: "data/tournament/r32_thirdplace_assignment_2026.csv"

# Calibration backtest (Layer 6). Scores the model out of sample with the Ranked
# Probability Score against real results, and compares it to a naive baseline.
calibrate:
  # Number of most recent matches to score. A single training cutoff is taken at
  # the start of this window and the model is fit once on data strictly before
  # it, then scored out of sample. Larger is more reliable but stretches the
  # window further back, so the single fit is slightly staler for its most recent
  # matches. The size trades cost against confidence and is tunable; widen later.
  backtest_size: 150
  # Number of non-overlapping windows for the walk-forward backtest, each of
  # backtest_size matches, stepping backward from as_of_date. More windows give a
  # tighter spread estimate but reach further into the past. The data runs back to
  # 1872, so even the earliest window still trains on tens of thousands of matches.
  walk_windows: 8

# Hybrid ensemble (ability estimates plus covariates into a tree ensemble).
# A separate per-match model evaluated on the walk-forward splits, not the
# simulator engine. The point-in-time Dixon-Coles ability feature is built from a
# grid of refits, each on data strictly before its grid date.
ensemble:
  # Days between point-in-time ability refits. Smaller is fresher but slower.
  grid_cadence_days: 120
  # Rolling lookback per refit. Beyond about eight years the xi time decay is tiny.
  grid_lookback_days: 2920
  # How far back the ability grid extends. Older matches get an unknown ability.
  grid_years: 12
  # Minimum matches in a refit slice; thinner slices are skipped.
  min_fit_matches: 200
  # Gradient boosting hyperparameters, fixed for reproducibility.
  max_iter: 300
  learning_rate: 0.05

# LLM analyst layer (Phase 8, the math versus LLM comparison). The math model
# produces Prediction A and freezes it; an LLM produces Prediction B blind to A;
# a third pass produces Prediction C reading A and B. All three are scored with
# the same RPS. See src/architect_wc/llm.
llm:
  # Model and tooling. Claude Opus 4.8 via the Anthropic API, key read from the
  # ANTHROPIC_API_KEY environment variable. Temperature is not set: it is removed
  # on Opus 4.8, so determinism is best effort and the frozen committed dossier is
  # the real reproducibility anchor. Prediction A is bit-reproducible because it is
  # analytic. Adaptive thinking is used, with effort high as the floor on both
  # phases and xhigh on the Phase 2 prediction call only.
  model: "claude-opus-4-8"
  effort_floor: "high"
  effort_prediction: "xhigh"
  # Server-side web search tool, research call only. Pinned and verified against
  # the live Anthropic docs before wiring rather than assumed.
  web_search_tool: "web_search_20260209"
  # Maximum web searches per research call.
  max_search_uses: 12
  # Any departure of the emitted lean from the anchor-implied lean beyond this
  # tolerance must be justified in writing in the prediction log.
  anchor_tolerance: 0.10
  # Frozen, pre-registered factor weights. Never fitted on outcomes. One review
  # pass allowed before the Round of 32, then an ablation surface. They sum to 1.
  weights:
    squad_availability: 0.22
    recent_form: 0.20
    tactical_matchup: 0.18
    coaching_staff: 0.15
    strategic_incentives: 0.12
    psychological_momentum: 0.07
    historical_head_to_head: 0.06

# Ablation toggles. The harness flips these to isolate each layer.
factors:
  elo: true
  dixon_coles: true
  squad_value: true
  # Off by default so the deployed forecast and the recorded 0.1611 calibration
  # stay unchanged. The ablation flips this on to measure what the friendly
  # downweight is worth before we decide whether it becomes the default.
  friendly_downweight: false
